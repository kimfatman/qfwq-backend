# ============================================================
# 企服外勤代办宝 - 生产环境 Docker Compose
# 使用方式: docker compose -f deploy/docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:
  # ==================== 应用服务 ====================
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: qfwq-app
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    restart: unless-stopped
    networks:
      - qfwq-network
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: qfwq-mysql
    # 不对外暴露端口，仅内部访问
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-qfwq_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - qfwq-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: qfwq-redis
    # 不对外暴露端口，仅内部访问
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qfwq-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: qfwq-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/qfwq.conf:/etc/nginx/conf.d/default.conf:ro
      - ../uploads:/app/uploads:ro
      # HTTPS 证书（启用后取消注释）
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - qfwq-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ==================== 网络 ====================
networks:
  qfwq-network:
    driver: bridge
